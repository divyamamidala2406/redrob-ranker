ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  No candidate data was fed to any external LLM during ranking.
  All scoring is deterministic rule-based logic running locally on CPU.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-factor ranker with explicit reasoning capture.
  Six scoring components (skills, experience, career, behavior, education,
  location) combined with a unique production-depth bonus score.
  Skill component uses a four-factor trust model: must-have group coverage,
  nice-to-have count, endorsement x duration trust, and Redrob platform
  assessment scores. Eight trap detectors handle honeypots (overlapping job
  dates, impossible YoE), keyword stuffers (unsupported high-value skill
  claims), fake expertise (assessment score contradiction), pure consulting
  backgrounds, and signal manipulation. Penalties applied as multipliers, not
  additive, to prevent gaming. Runtime ~210s for 100K candidates on CPU.

